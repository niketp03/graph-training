data:
  num_nodes: 10000
  edge_probability: 0.0001
  directed: true
  num_trajectories: 1000000
  max_path_length: 10
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  output_dir: ./data_output_more_trajectories
  seed: 42
  remove_non_connected: true
model:
  hidden_size: 896
  num_hidden_layers: 24
  num_attention_heads: 14
  num_key_value_heads: 2
  intermediate_size: 4864
  hidden_act: silu
  max_position_embeddings: 32768
  rms_norm_eps: 1.0e-06
  rope_theta: 1000000.0
  attention_dropout: 0.0
  initializer_range: 0.02
  tie_word_embeddings: true
train:
  lr: 0.0001
  weight_decay: 0.01
  warmup_steps: 100
  max_epochs: 10
  batch_size: 32
  gradient_accumulation: 1
  gradient_clip_val: 1.0
  precision: bf16-mixed
  num_workers: 2
  accelerator: auto
  devices: auto
  wandb_project: graph-training-large-2-directed-more-trajectories
  wandb_run_name: null
  checkpoint_dir: ./checkpoints
  val_check_interval: 1.0
postrain:
  algorithm: reinforce
  checkpoint_path: checkpoints/epoch-epoch=02-val_loss-val/loss=1.5257.ckpt
  sampling_algorithm: uniform_specified
  n_max: 10
  num_pairs_per_step: 256
  group_size: 4
  max_new_tokens: 64
  temperature: 1.0
  top_k: 0
  top_p: 1.0
  lr: 0.0001
  weight_decay: 0.01
  warmup_steps: 100
  max_steps: 10000
  gradient_clip_val: 1.0
  kl_coeff: 0.01
  clip_range: 0.2
  num_ppo_epochs: 1
  baseline: none
  correct_reward: 1.0
  incorrect_reward: 0.0
  wandb_project: graph-postrain-uniform-all-connected-more-trajectories
  wandb_run_name: null
  checkpoint_dir: ./postrain_checkpoints-uniform-all-connected-more-trajectories
  save_every_steps: 500
  log_every_steps: 10
  eval_every_steps: 100
  eval_num_pairs: 256
  precision: bf16-mixed
  seed: 42
  resume_from: null
