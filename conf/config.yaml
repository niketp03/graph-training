data:
  num_nodes: 10000
  edge_probability: 0.0001
  directed: true
  num_trajectories: 100000
  max_path_length: 10
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  output_dir: "./data_output_large_critical_rw_directed_2"
  seed: 42
  remove_non_connected: True

model:
  hidden_size: 896
  num_hidden_layers: 24
  num_attention_heads: 14
  num_key_value_heads: 2
  intermediate_size: 4864
  hidden_act: "silu"
  max_position_embeddings: 32768
  rms_norm_eps: 1.0e-6
  rope_theta: 1000000.0
  attention_dropout: 0.0
  initializer_range: 0.02
  tie_word_embeddings: true

train:
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 100
  max_epochs: 10
  batch_size: 32
  gradient_accumulation: 1
  gradient_clip_val: 1.0
  precision: "bf16-mixed"
  num_workers: 2
  accelerator: "auto"
  devices: "auto"
  wandb_project: "graph-training-large-2-directed"
  wandb_run_name: null
  checkpoint_dir: "./checkpoints"
  val_check_interval: 1.0

postrain:
  algorithm: "reinforce"            # "grpo" or "reinforce"
  checkpoint_path: "checkpoints/last-v7.ckpt"        # path to a supervised-training Lightning checkpoint

  # Sampling
  sampling_algorithm: "uniform_connected"  # "uniform_pairs" or "uniform_specified" or "uniform_connected" or "teacher_stationary"
  n_max: 20                   # max path length for uniform_specified sampling
  num_pairs_per_step: 256     # (u,v) pairs sampled per RL step
  group_size: 4                # rollouts per pair (GRPO); ignored by REINFORCE
  max_new_tokens: 64          # max tokens the model may generate per rollout
  temperature: 1.0
  top_k: 0                     # 0 = disabled
  top_p: 1.0

  # Optimiser
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 100
  max_steps: 10000
  gradient_clip_val: 1.0

  # GRPO-specific
  kl_coeff: 0.01               # weight of KL(pi_theta || pi_ref) penalty
  clip_range: 0.2              # PPO clipping epsilon
  num_ppo_epochs: 1            # surrogate-objective epochs per rollout batch

  # REINFORCE-specific
  baseline: "none"             # "mean" or "none"

  # Rewards
  correct_reward: 1.0
  incorrect_reward: 0.0

  # Logging & checkpointing
  wandb_project: "graph-postrain-uniform-all-connected"
  wandb_run_name: null
  checkpoint_dir: "./postrain_checkpoints-uniform-all-connected"
  save_every_steps: 500
  log_every_steps: 10
  eval_every_steps: 100
  eval_num_pairs: 256

  # Hardware
  precision: "bf16-mixed"
  seed: 42

  # Optional: resume from a previous post-training checkpoint
  resume_from: null

hydra:
  run:
    dir: "."
  job:
    chdir: false
